<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .project {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .project img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease-in-out;
        }

        .project .description {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .project:hover img {
            opacity: 0.3;
        }

        .project:hover .description {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="project" onclick="location.href='project1.html'">
        <img src="project1.png" alt="Project 1">
        <div class="description">Project 1 - Mechanical Design</div>
    </div>

    <div class="project" onclick="location.href='project2.html'">
        <img src="project2.png" alt="Project 2">
        <div class="description">Project 2 - Web Development</div>
    </div>

    <div class="project" onclick="location.href='project3.html'">
        <img src="project3.png" alt="Project 3">
        <div class="description">Project 3 - Robotics</div>
    </div>
</body>
</html>
